<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Jeu 421</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Jeu 421</h1>

<div id="menu">

<h2>Nouvelle partie</h2>

<label>Nombre de joueurs humains</label>
<input type="number" id="humanPlayers" min="1" max="6" value="1">

<label>Nombre de joueurs IA</label>
<input type="number" id="aiPlayers" min="0" max="6" value="1">

<button onclick="createGame()">Créer partie</button>

<div id="playersConfig"></div>

</div>

<div id="gameArea" style="display:none">

<h2>Table de jeu</h2>

<div id="playersBoard"></div>

<button onclick="rollDice()">Lancer les dés</button>
<button onclick="endTurn()">Fin du tour</button>

</div>

<h2>Statistiques</h2>

<div id="stats"></div>

<script src="script.js"></script>
<script src="js/game.js"></script>
<script src="js/ai.js"></script>
<script src="js/stats.js"></script>

</body>
</html>
